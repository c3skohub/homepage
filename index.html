<title>c3skoNews</title>
<style>
:root {
  --bg:#000; --panel:#0d0d10; --panel2:#17171c; --text:#ececf0; --muted:#9a9aa3;
  --accent:#ff7a1a; --border:#26262d; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --radius:14px; --shadow:0 10px 24px rgba(0,0,0,.28); --font-size:15px; --density:1;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(255,122,26,.07), transparent 20%),
    radial-gradient(circle at top left, rgba(255,255,255,.03), transparent 18%),
    var(--bg);
  color:var(--text); font-size:var(--font-size); min-height:100vh;
}
.wrap { width:min(1380px, calc(100% - 20px)); margin:0 auto; padding:12px 0 40px; }
.topbar {
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; padding:10px 0 14px;
  position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
  background:linear-gradient(to bottom, rgba(0,0,0,.88), rgba(0,0,0,.58));
}
.brand { display:flex; align-items:center; gap:10px; min-width:0; }
.logo { height:42px; width:auto; max-width:min(70vw,600px); display:block; }
.actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.search {
  display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:12px; padding:0 10px; height:42px; min-width:min(340px,55vw);
}
.search input { background:transparent; border:0; outline:none; color:var(--text); width:100%; font-size:.95rem; }
button,.chip {
  border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text);
  border-radius:12px; min-height:42px; padding:0 12px; cursor:pointer; transition:.18s ease; font-size:.92rem;
}
button:hover,.chip:hover { transform:translateY(-1px); background:rgba(255,255,255,.07); }
button.primary { background:var(--accent); border-color:transparent; color:#111; font-weight:700; }
.chip.active { color:#111; border-color:transparent; font-weight:700; }
.panel {
  display:none; border:1px solid var(--border); background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.03));
  border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:14px;
}
.panel.open { display:block; }
.grid5 { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
.grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.field { display:grid; gap:6px; }
.field label { font-size:.84rem; color:var(--muted); }
.field input,.field select {
  width:100%; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,.04);
  color:var(--text); padding:11px 12px; outline:none; min-height:42px;
}
.toggle-item,.catpref {
  border:1px solid var(--border); border-radius:12px; background:rgba(255,255,255,.03);
  padding:10px 12px; display:flex; align-items:center; gap:8px;
}
.toggle-item input,.catpref input[type="checkbox"] { accent-color:var(--accent); }
.catpref { justify-content:space-between; }
.catpref .left { display:flex; align-items:center; gap:8px; min-width:0; flex:1; }
.catpref .name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.color-input {
  width:40px !important; min-height:32px !important; padding:2px !important; border-radius:8px !important;
  background:transparent !important; border:1px solid var(--border) !important;
}
.toolbar { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; margin-bottom:14px; }
.chips-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:thin; }
.statusbar { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 16px; }
.pill {
  display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:rgba(255,255,255,.04);
  color:var(--muted); border-radius:999px; padding:7px 10px; font-size:.82rem;
}
.dot { width:8px; height:8px; border-radius:999px; background:var(--muted); }
.dot.ok { background:var(--ok); } .dot.warn { background:var(--warn); } .dot.danger { background:var(--danger); }
.hero-grid { display:grid; grid-template-columns:1.15fr .85fr; gap:14px; margin-bottom:18px; }
.hero-card,.feed-card {
  border:1px solid var(--border); background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.03));
  border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
}
.hero-head { padding:14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:10px; }
.hero-head h2 { margin:0; font-size:1rem; }
.hero-body { padding:14px; display:grid; gap:10px; }
.breaking-item,.article {
  display:grid; gap:6px; padding:12px; border:1px solid rgba(255,255,255,.05); background:rgba(255,255,255,.025);
  border-radius:12px; text-decoration:none; color:var(--text); transition:.18s ease;
}
.breaking-item:hover,.article:hover { background:rgba(255,255,255,.05); transform:translateY(-1px); }
.breaking-item h3,.article h4 { margin:0; line-height:1.3; }
.breaking-item h3 { font-size:.98rem; } .article h4 { font-size:.96rem; }
.article p {
  margin:0; color:var(--muted); line-height:1.4; font-size:.86rem; display:-webkit-box;
  -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.meta-line,.article-meta,.feed-meta { display:flex; gap:8px; flex-wrap:wrap; color:var(--muted); font-size:.78rem; align-items:center; }
.article-meta { justify-content:space-between; }
.rank-num {
  width:22px; height:22px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center;
  background:var(--accent); color:#111; font-weight:700; font-size:.78rem;
}
.categories-wrap { display:grid; gap:20px; }
.category-section { display:grid; gap:12px; }
.category-head {
  display:flex; justify-content:space-between; align-items:center; gap:12px; border-bottom:1px solid var(--border);
  border-left:4px solid var(--cat-color,var(--accent));
  background:linear-gradient(90deg, var(--cat-bg, rgba(255,122,26,.08)), transparent 45%);
  border-radius:10px 0 0 10px; padding:8px 12px;
}
.category-head h2 { margin:0; font-size:1rem; } .category-meta { color:var(--muted); font-size:.83rem; white-space:nowrap; }
.feed-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:14px; }
.feed-card { border-top:3px solid var(--cat-color,var(--accent)); display:flex; flex-direction:column; min-height:220px; }
.feed-head {
  padding:14px 14px 10px; border-bottom:1px solid var(--border); display:grid; gap:8px;
  background:linear-gradient(180deg, var(--cat-bg, rgba(255,255,255,.02)), transparent);
}
.feed-topline { display:flex; justify-content:space-between; gap:10px; align-items:center; }
.feed-title { display:flex; gap:10px; align-items:center; min-width:0; }
.source-icon {
  width:28px; height:28px; border-radius:8px; border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04); object-fit:cover; flex:0 0 28px;
}
.feed-title h3 { margin:0; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.badge {
  border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.04);
  color:var(--muted); font-size:.74rem; padding:4px 8px; white-space:nowrap;
}
.category-badge { color:#fff; border-color:transparent; background:var(--cat-color,var(--accent)); }
.feed-controls { display:flex; gap:8px; flex-wrap:wrap; }
.feed-controls .mini { min-height:34px; padding:0 10px; border-radius:10px; font-size:.84rem; }
.feed-body { padding:12px 14px 14px; display:grid; gap:10px; flex:1; }
.star { border:0; background:transparent; color:#ffd166; padding:0; min-height:0; font-size:1rem; }
.empty,.loading,.error-box {
  border:1px dashed var(--border); border-radius:12px; padding:14px; color:var(--muted); background:rgba(255,255,255,.02);
}
dialog {
  border:1px solid var(--border); border-radius:18px; background:#0d0d10; color:var(--text);
  width:min(760px, calc(100vw - 24px)); padding:0; box-shadow:0 20px 60px rgba(0,0,0,.55);
}
dialog::backdrop { background:rgba(0,0,0,.7); }
.modal-head,.modal-body,.modal-foot { padding:16px; }
.modal-head { border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:10px; }
.modal-body { display:grid; gap:12px; }
.modal-foot { border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.field-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.footer-note { margin-top:18px; color:var(--muted); font-size:.78rem; text-align:center; line-height:1.55; padding-bottom:28px; }
.footer-settings {
  position:fixed; right:12px; bottom:12px; z-index:999; background:#111; color:#fff; border:1px solid #333;
  width:38px; height:38px; border-radius:999px; display:flex; align-items:center; justify-content:center;
  font-size:16px; opacity:.85; box-shadow:0 8px 20px rgba(0,0,0,.38);
}
@media (max-width:980px) { .grid5,.grid4{grid-template-columns:repeat(2,1fr)} .hero-grid{grid-template-columns:1fr} }

  <form method="dialog">
    <div class="modal-head">
      <strong>Aggiungi / modifica fonte RSS</strong>

    </div>
    <div class="modal-body">
      <input type="hidden" id="sourceId">
      <div class="field-grid">
        <div class="field"><label for="sourceName">Nome fonte</label><input id="sourceName" placeholder="Es. ANSA Top News"></div>

</dialog>

<script>
const STORAGE_KEY = 'F01_c3skonews_fix_v7';

const defaultSources = [{"name": "ANSA Top News", "category": "Italia", "site": "https://www.ansa.it/", "rss": "https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml", "tags": ["breaking", "italia"], "official": true}, {"name": "Il Post", "category": "Approfondimenti", "site": "https://www.ilpost.it/", "rss": "https://www.ilpost.it/feed/", "tags": ["analisi", "italia"], "official": true}, {"name": "Internazionale", "category": "Esteri", "site": "https://www.internazionale.it/", "rss": "https://www.internazionale.it/sitemaps/rss.xml", "tags": ["esteri", "analisi"], "official": true}, {"name": "Wired Italia", "category": "Tecnologia", "site": "https://www.wired.it/", "rss": "https://www.wired.it/feed/", "tags": ["tech", "cyber"], "official": true}, {"name": "RomaToday", "category": "Roma", "site": "https://www.romatoday.it/", "rss": "https://www.romatoday.it/rss/home.xml", "tags": ["roma", "locale"], "official": true}, {"name": "Il Sole 24 Ore - Economia", "category": "Economia", "site": "https://www.ilsole24ore.com/", "rss": "https://www.ilsole24ore.com/rss/economia.xml", "tags": ["economia", "mercati"], "official": true}, {"name": "Agenda Digitale", "category": "Tecnologia", "site": "https://www.agendadigitale.eu/", "rss": "https://www.agendadigitale.eu/feed/", "tags": ["digitale", "innovazione"], "official": true}, {"name": "Adnkronos", "category": "Italia", "site": "https://www.adnkronos.com/", "rss": "https://www.adnkronos.com/RSS_PrimaPagina.xml", "tags": ["news", "agenzia"], "official": true}, {"name": "Fanpage", "category": "Italia", "site": "https://www.fanpage.it/", "rss": "https://www.fanpage.it/feed/", "tags": ["news", "attualita"], "official": true}, {"name": "Forbes Italia", "category": "Economia", "site": "https://forbes.it/", "rss": "https://forbes.it/feed/", "tags": ["business", "economia"], "official": true}, {"name": "Il Manifesto", "category": "Italia", "site": "https://ilmanifesto.it/", "rss": "https://cms.ilmanifesto.it/feed", "tags": ["politica", "attualita"], "official": true}, {"name": "Gazzetta - Ultime", "category": "Sport", "site": "https://www.gazzetta.it/", "rss": "https://www.gazzetta.it/dynamic-feed/rss/section/last.xml", "tags": ["sport", "ultime"], "official": true}, {"name": "Gazzetta - Calcio", "category": "Sport", "site": "https://www.gazzetta.it/calcio/", "rss": "https://www.gazzetta.it/dynamic-feed/rss/section/Calcio.xml", "tags": ["sport", "calcio"], "official": true}, {"name": "IlSoftware.it", "category": "Tecnologia", "site": "https://www.ilsoftware.it/", "rss": "https://www.ilsoftware.it/feed/", "tags": ["software", "informatica"], "official": true}, {"name": "Analisi dei Rischi Informatici", "category": "Tecnologia", "site": "https://www.analisideirischinformatici.it/", "rss": "https://www.analisideirischinformatici.it/sicurezza/category/allerta-pericoli-informatici/feed/", "tags": ["sicurezza", "cyber"], "official": true}, {"name": "Il Fatto Quotidiano", "category": "Italia", "site": "https://www.ilfattoquotidiano.it/", "rss": "https://www.ilfattoquotidiano.it/feed/", "tags": ["news", "politica"], "official": true}, {"name": "Open", "category": "Italia", "site": "https://www.open.online/", "rss": "https://www.open.online/feed/", "tags": ["attualita", "fact-checking"], "official": true}, {"name": "Televideo Ultimora", "category": "Italia", "site": "https://www.televideo.rai.it/", "rss": "https://www.televideo.rai.it/televideo/pub/rssultimaora.xml", "tags": ["ultimora", "rai"], "official": true}, {"name": "RAI Viabilità", "category": "Italia", "site": "https://www.rai.it/", "rss": "https://www.rai.it/dl/portale/rss/viabilita-rss.xml", "tags": ["viabilita", "servizio"], "official": true}, {"name": "Bricomagazine", "category": "Fai da te", "site": "https://www.bricomagazine.com/", "rss": "https://www.bricomagazine.com/feed/", "tags": ["brico", "retail"], "official": true}, {"name": "DIY & Garden", "category": "Fai da te", "site": "https://diyandgarden.com/", "rss": "https://diyandgarden.com/feed/", "tags": ["garden", "diy"], "official": true}, {"name": "Criptovaluta.it", "category": "Criptovalute", "site": "https://www.criptovaluta.it/", "rss": "https://www.criptovaluta.it/feed/", "tags": ["crypto", "finanza"], "official": true}, {"name": "Immediato", "category": "Italia", "site": "https://www.immediato.net/", "rss": "https://www.immediato.net/feed/", "tags": ["cronaca", "attualita"], "official": true}, {"name": "MiaMammaUsaLinux", "category": "Tecnologia", "site": "https://www.miamammausalinux.org/", "rss": "https://www.miamammausalinux.org/feed/", "tags": ["linux", "opensource"], "official": true}].map((s, i) => ({...s, id: crypto.randomUUID()}));

const baseCategoryColors = {
  'Tutte':'#ff7a1a','Italia':'#22c55e','Approfondimenti':'#14b8a6','Esteri':'#3b82f6','Tecnologia':'#8b5cf6',
  'Roma':'#ef4444','Economia':'#f59e0b','Sport':'#06b6d4','Fai da te':'#16a34a','Criptovalute':'#f97316','Altro':'#6b7280'
};

const state = {
  sources: structuredClone(defaultSources),
  favorites: [],
  settings: { articlesPerFeed:5, fontScale:15, density:1, proxy:'rss2json', sortMode:'date_desc', settingsOpen:false },
  feeds: new Map(),
  activeCategory: 'Tutte',
  activeMode: 'all',
  search: '',
  lastRefresh: null,
  loading: false,
  visibility: {
    search:true, status:true, breaking:true, ranking:true, actionButtons:true,
    categoryBar:true, modeBar:true, categoryPrefs:true, amoled:false, feedActions:true, categories: {}
  },
  categoryColors: {...baseCategoryColors},
  categoryPriority: {},
  collapsed: { categories: {}, feeds: {} },
  feedProxyMap: {}
};

const $ = (id) => document.getElementById(id);

function ensureCategoryPrefs() {
  const cats = [...new Set(state.sources.map(s => s.category).filter(Boolean))];
  for (const cat of cats) {
    if (!(cat in state.visibility.categories)) state.visibility.categories[cat] = true;
    if (!(cat in state.categoryColors)) state.categoryColors[cat] = baseCategoryColors.Altro;
    if (!(cat in state.categoryPriority)) state.categoryPriority[cat] = 999;
    if (!(cat in state.collapsed.categories)) state.collapsed.categories[cat] = false;
    if (!(cat in state.categoryPriority)) state.categoryPriority[cat] = 999;
  }
}

function saveState() {
  ensureCategoryPrefs();
  const payload = {
    sources: state.sources,
    favorites: state.favorites,
    settings: state.settings,
    visibility: state.visibility,
    categoryColors: state.categoryColors,
    categoryPriority: state.categoryPriority,
    collapsed: state.collapsed,
    feedProxyMap: state.feedProxyMap || {},
    categoryPriority: state.categoryPriority
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
}


function saveSettingsNow() {
  state.settings.articlesPerFeed = Number($('articlesPerFeed').value);
  state.settings.fontScale = Number($('fontScale').value);
  state.settings.density = Number($('density').value);
  state.settings.proxy = $('proxySelect').value;
  state.settings.sortMode = $('sortMode').value;

  state.visibility.search = $('toggleSearch').checked;
  state.visibility.status = $('toggleStatus').checked;
  state.visibility.breaking = $('toggleBreaking').checked;
  state.visibility.ranking = $('toggleRanking').checked;
  state.visibility.actionButtons = $('toggleActionButtons').checked;
  state.visibility.feedActions = $('toggleFeedActions').checked;
  state.visibility.hideBroken = $('toggleHideBroken').checked;
  state.visibility.categoryBar = $('toggleCategoryBar').checked;
  state.visibility.modeBar = $('toggleModeBar').checked;
  state.visibility.categoryPrefs = $('toggleCategoryPrefs').checked;
  state.visibility.amoled = $('toggleAmoled').checked;
  state.visibility.superAmoled = $('toggleSuperAmoled').checked;

  document.querySelectorAll('[data-cat-visible]').forEach(el => {
    state.visibility.categories[el.dataset.catVisible] = el.checked;
  });
  document.querySelectorAll('[data-cat-color]').forEach(el => {
    state.categoryColors[el.dataset.catColor] = String(el.value || '#6B7280').toUpperCase();
  });
  document.querySelectorAll('[data-cat-color-text]').forEach(el => {
    let value = String(el.value || '').trim().toUpperCase();
    if (!value.startsWith('#')) value = '#' + value;
    if (/^#[0-9A-F]{6}$/.test(value)) state.categoryColors[el.dataset.catColorText] = value;
  });
  document.querySelectorAll('[data-cat-priority]').forEach(el => {
    const value = Math.max(0, Math.min(99, parseInt(el.value, 10) || 0));
    state.categoryPriority[el.dataset.catPriority] = value;
  });

  state.settings.settingsOpen = false;
  saveState();
  render();
  flashSaved();
}
window.saveSettingsNow = saveSettingsNow;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      ensureCategoryPrefs();
      return;
    }
    const saved = JSON.parse(raw);
    if (Array.isArray(saved.sources) && saved.sources.length) state.sources = saved.sources;
    if (Array.isArray(saved.favorites)) state.favorites = saved.favorites;
    if (saved.settings && typeof saved.settings === 'object') state.settings = {...state.settings, ...saved.settings};
    if (saved.visibility && typeof saved.visibility === 'object') {
      state.visibility = {
        ...state.visibility,
        ...saved.visibility,
        categories: { ...state.visibility.categories, ...(saved.visibility.categories || {}) }
      };
    }
    if (saved.categoryColors && typeof saved.categoryColors === 'object') {
      state.categoryColors = {...state.categoryColors, ...saved.categoryColors};
    }
    if (saved.categoryPriority && typeof saved.categoryPriority === 'object') {
      state.categoryPriority = {...state.categoryPriority, ...saved.categoryPriority};
    }
    if (saved.collapsed && typeof saved.collapsed === 'object') {
      state.collapsed = {
        categories: {...(state.collapsed?.categories || {}), ...(saved.collapsed.categories || {})},
        feeds: {...(state.collapsed?.feeds || {}), ...(saved.collapsed.feeds || {})}
      };
    }
    if (saved.feedProxyMap && typeof saved.feedProxyMap === 'object') {
      state.feedProxyMap = {...(state.feedProxyMap || {}), ...saved.feedProxyMap};
    }
    if (saved.categoryPriority && typeof saved.categoryPriority === 'object') {
      state.categoryPriority = {...state.categoryPriority, ...saved.categoryPriority};
    }
  } catch (e) {}
  ensureCategoryPrefs();
}

function escapeHtml(str='') {
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#39;");
}

function slugify(input) {
  return String(input).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function hexToRgba(hex, alpha=.10) {
  const c = String(hex || '').replace('#','');
  if (c.length !== 6) return `rgba(255,122,26,${alpha})`;
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function categoryStyle(category) {
  const color = state.categoryColors[category] || baseCategoryColors.Altro;
  return { color, bg: hexToRgba(color,.10) };
}

function faviconFor(source) {
  try {
    const host = new URL(source.site || source.rss).hostname;
    return `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(host)}`;
  } catch {
    return '';
  }
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent || tmp.innerText || '';
}

function formatTime(pubDate) {
  if (!pubDate) return 'senza data';
  const d = new Date(pubDate);
  if (Number.isNaN(d.getTime())) return 'data non valida';
  return d.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function getFeedLatestTimestamp(source) {
  const data = state.feeds.get(source.id);
  const items = data?.status === 'ok' ? (data.items || []) : [];
  let latest = 0;
  for (const item of items) {
    const t = new Date(item.pubDate || 0).getTime() || 0;
    if (t > latest) latest = t;
  }
  return latest;
}

function sortSourcesList(list) {
  const arr = [...list];
  switch (state.settings.sortMode) {
    case 'name_asc':
      arr.sort((a,b) => a.name.localeCompare(b.name, 'it'));
      break;
    case 'category_asc':
      arr.sort((a,b) => ((state.categoryPriority[a.category || 'Altro'] ?? 999) - (state.categoryPriority[b.category || 'Altro'] ?? 999)) || (a.category || '').localeCompare(b.category || '', 'it') || a.name.localeCompare(b.name, 'it'));
      break;
    case 'date_desc':
    default:
      arr.sort((a,b) => getFeedLatestTimestamp(b) - getFeedLatestTimestamp(a) || a.name.localeCompare(b.name, 'it'));
      break;
  }
  return arr;
}


function sortCategoryNames(iterable) {
  return [...iterable].sort((a,b) =>
    (state.categoryPriority[a] ?? 999) - (state.categoryPriority[b] ?? 999) ||
    String(a).localeCompare(String(b), 'it')
  );
}

function chipButton(label, active, onClick) {
  const btn = document.createElement('button');
  btn.className = `chip ${active ? 'active' : ''}`;
  const style = categoryStyle(label);
  if (active) btn.style.background = style.color;
  else btn.style.borderColor = style.color + '55';
  btn.textContent = label;
  btn.onclick = onClick;
  return btn;
}

window.toggleCategoryCollapsed = function toggleCategoryCollapsed(cat){
  state.collapsed.categories[cat] = !state.collapsed.categories[cat];
  saveState();
  render();
}
window.toggleFeedCollapsed = function toggleFeedCollapsed(id){
  state.collapsed.feeds[id] = !state.collapsed.feeds[id];
  saveState();
  render();
}


function refreshCategoryOptions(){
  const list = $('categoryOptions');
  if(!list) return;
  const cats = [...new Set(state.sources.map(s => s.category).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'it'));
  list.innerHTML = cats.map(cat => `<option value="${escapeHtml(cat)}"></option>`).join('');
}

function renderCategoryBar() {
  const cats = ['Tutte', ...sortCategoryNames(new Set(state.sources.map(s=>s.category).filter(Boolean)))];
  $('categoryBarSection').innerHTML = '';
  for (const cat of cats) {
    $('categoryBarSection').appendChild(chipButton(cat, cat===state.activeCategory, () => {
      state.activeCategory = cat;
      render();
    }));
  }
}

function renderCategoryPrefs() {
  ensureCategoryPrefs();
  const cats = sortCategoryNames(new Set(state.sources.map(s=>s.category).filter(Boolean)));
  $('categoryPrefsGrid').innerHTML = cats.map(cat => {
    const priority = Number.isFinite(Number(state.categoryPriority[cat])) ? Number(state.categoryPriority[cat]) : 99;
    const priorityDisplay = String(priority).padStart(2, '0');
    const color = String(state.categoryColors[cat] || '#6B7280').toUpperCase();
    return `
      <div class="catpref compact-row">
        <div class="vis-wrap">
          <input type="checkbox" data-cat-visible="${escapeHtml(cat)}" ${state.visibility.categories[cat] ? 'checked' : ''} title="Mostra/Nascondi categoria">
        </div>
        <div class="left pos">
          <input class="prio-input" type="number" min="0" max="99" step="1" data-cat-priority="${escapeHtml(cat)}" value="${escapeHtml(priorityDisplay)}" title="Posizione">
        </div>
        <div class="left">
          <span class="name" title="Modifica categoria" onclick="openCategoryEdit(\'${escapeHtml(cat)}\')">${escapeHtml(cat)}</span>
        </div>
        <div class="right">
          <input class="color-input" type="color" data-cat-color="${escapeHtml(cat)}" value="${escapeHtml(color)}" title="Colore categoria">
          <input class="hex-input" type="text" maxlength="7" data-cat-color-text="${escapeHtml(cat)}" value="${escapeHtml(color)}" placeholder="#RRGGBB" title="Colore esadecimale">
        </div>
      </div>`;
  }).join('');

  document.querySelectorAll('[data-cat-visible]').forEach(el => {
    el.onchange = () => {
      state.visibility.categories[el.dataset.catVisible] = el.checked;
      saveState();
      render();
    };
  });
  document.querySelectorAll('[data-cat-color]').forEach(el => {
    el.oninput = () => {
      const value = String(el.value || '#6B7280').toUpperCase();
      state.categoryColors[el.dataset.catColor] = value;
      saveState();
      render();
    };
  });
  document.querySelectorAll('[data-cat-color-text]').forEach(el => {
    el.onchange = () => {
      let value = String(el.value || '').trim().toUpperCase();
      if (!value.startsWith('#')) value = '#' + value;
      if (/^#[0-9A-F]{6}$/.test(value)) {
        state.categoryColors[el.dataset.catColorText] = value;
        saveState();
        render();
      } else {
        el.value = String(state.categoryColors[el.dataset.catColorText] || '#6B7280').toUpperCase();
      }
    };
  });
  document.querySelectorAll('[data-cat-priority]').forEach(el => {
    el.onchange = () => {
      const value = Math.max(0, Math.min(99, parseInt(el.value, 10) || 0));
      state.categoryPriority[el.dataset.catPriority] = value;
      saveState();
      render();
    };
  });
}

function renderStatus() {
  const total = state.sources.length;
  const loaded = [...state.feeds.values()].filter(v => v.status === 'ok').length;
  const errors = [...state.feeds.values()].filter(v => v.status === 'error').length;
  const custom = state.sources.filter(s => !s.official).length;
  const favoriteCount = state.favorites.length;
  const lr = state.lastRefresh ? new Date(state.lastRefresh).toLocaleString('it-IT') : 'mai';
  $('lastRefreshLabel').textContent = `Aggiornamento: ${lr}`;
  $('statusBarSection').innerHTML = `
    <span class="pill"><span class="dot ${state.loading ? 'warn' : 'ok'}"></span>${state.loading ? 'Aggiornamento in corso' : 'Pronto'}</span>
    <span class="pill">Fonti: <strong>${total}</strong></span>
    <span class="pill">OK: <strong>${loaded}</strong></span>
    <span class="pill">Errori: <strong>${errors}</strong></span>
    <span class="pill">Preferite: <strong>${favoriteCount}</strong></span>
    <span class="pill">Custom: <strong>${custom}</strong></span>
  `;
}

function passesFilters(source, feedData) {
  const search = state.search.trim().toLowerCase();
  if (state.activeCategory !== 'Tutte' && source.category !== state.activeCategory) return false;
  if (state.activeMode === 'favorites' && !state.favorites.includes(source.id)) return false;
  if (state.activeMode === 'custom' && source.official) return false;
  if (state.visibility.hideBroken && state.feeds.get(source.id)?.status === 'error') return false;
  if (!state.visibility.categories[source.category]) return false;
  if (!search) return true;
  const hay = [
    source.name, source.category, source.site, ...(source.tags || []),
    ...(feedData?.items || []).map(it => `${it.title || ''} ${it.description || ''}`)
  ].join(' ').toLowerCase();
  return hay.includes(search);
}

function buildArticleMarkup(source, item) {
  const title = escapeHtml(stripHtml(item.title || 'Senza titolo'));
  const desc = escapeHtml(stripHtml(item.description || item.contentSnippet || ''));
  const time = formatTime(item.pubDate);
  const host = (() => {
    try { return new URL(item.link || source.site).hostname.replace('www.',''); }
    catch { return ''; }
  })();
  return `<a class="article" href="${escapeHtml(item.link || source.site)}" target="_blank" rel="noopener noreferrer"><h4>${title}</h4>${desc ? `<p>${desc}</p>` : ''}<div class="article-meta"><span>${time}</span><span>${escapeHtml(host)}</span></div></a>`;
}

function buildBreakingAndRanking() {
  const all = [], ranking = [];
  for (const source of state.sources) {
    if (!state.visibility.categories[source.category]) continue;
    const data = state.feeds.get(source.id);
    const items = data?.status === 'ok' ? (data.items || []) : [];
    ranking.push({source, count: items.length});
    items.slice(0,4).forEach((item, idx) => {
      all.push({source, item, freshness: new Date(item.pubDate || 0).getTime() || 0, weight: (4-idx)});
    });
  }
  all.sort((a,b) => (b.freshness + b.weight*1000) - (a.freshness + a.weight*1000));
  const breaking = all.slice(0,5);
  $('breakingCount').textContent = `${breaking.length} articoli`;
  $('breakingGrid').innerHTML = breaking.length ? breaking.map((entry, i) => `
    <a class="breaking-item" href="${escapeHtml(entry.item.link || entry.source.site)}" target="_blank" rel="noopener noreferrer">
      <div class="meta-line"><span class="rank-num">${i+1}</span><span>${escapeHtml(entry.source.name)}</span><span>·</span><span>${escapeHtml(entry.source.category)}</span></div>
      <h3>${escapeHtml(stripHtml(entry.item.title || 'Senza titolo'))}</h3>
      <div class="meta-line"><span>${formatTime(entry.item.pubDate)}</span></div>
    </a>`).join('') : '<div class="empty">Nessun articolo disponibile.</div>';
  ranking.sort((a,b) => b.count - a.count || a.source.name.localeCompare(b.source.name, 'it'));
  $('rankingGrid').innerHTML = ranking.length ? ranking.slice(0,6).map((entry, i) => `
    <div class="breaking-item" style="cursor:default">
      <div class="meta-line"><span class="rank-num">${i+1}</span><span>${escapeHtml(entry.source.name)}</span></div>
      <h3>${entry.count} articoli caricati</h3>
      <div class="meta-line"><span>${escapeHtml(entry.source.category)}</span><span>·</span><span>${entry.source.official ? 'preset' : 'custom'}</span></div>
    </div>`).join('') : '<div class="empty">Nessun ranking disponibile.</div>';
}

function buildFeedCard(source) {
  const data = state.feeds.get(source.id);
  const isFav = state.favorites.includes(source.id);
  const sourceTags = (source.tags || []).slice(0,3).map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('');
  const cat = source.category || 'Altro';
  const cs = categoryStyle(cat);
  let body = '<div class="loading">Feed non caricato.</div>';
  if (data?.status === 'loading') body = '<div class="loading">Caricamento feed…</div>';
  else if (data?.status === 'error') body = `<div class="error-box">Errore feed: ${escapeHtml(data.error || 'impossibile caricare il feed')}</div>`;
  else if (data?.status === 'ok') {
    const articles = (data.items || []).slice(0, Number(state.settings.articlesPerFeed));
    body = articles.length ? articles.map(item => buildArticleMarkup(source, item)).join('') : '<div class="empty">Feed raggiunto, ma nessun articolo trovato.</div>';
  }
  return `<section class="feed-card ${state.collapsed.feeds[source.id] ? 'is-collapsed' : ''}" style="--cat-color:${cs.color}; --cat-bg:${cs.bg};"><div class="feed-head"><div class="feed-topline"><div class="feed-title"><button class="collapser" onclick="toggleFeedCollapsed('${source.id}')" title="Apri/chiudi feed">${state.collapsed.feeds[source.id] ? '▸' : '▾'}</button><img class="source-icon" src="${escapeHtml(faviconFor(source))}" alt=""><h3>${escapeHtml(source.name)}</h3><span class="badge category-badge">${escapeHtml(cat)}</span></div><div style="display:flex;align-items:center;gap:6px;">${source.official ? '<span title="Fonte ufficiale" style="color:#22c55e;font-size:.95rem;line-height:1;">✔</span>' : ''}<button class="star" onclick="toggleFavorite('${source.id}')" title="Preferita">${isFav ? '★' : '☆'}</button></div></div><div class="feed-meta"><span>${escapeHtml(source.site || source.rss)}</span>${sourceTags}${data?.status === 'error' ? `<span class="error-box" style="padding:4px 8px;border-style:solid;border-color:#ef4444;color:#ffb4b4;font-size:.74rem;">${escapeHtml(data.error || 'errore feed')}</span>` : ''}</div><div class="feed-controls"><button class="mini" onclick="refreshOne('${source.id}')">Aggiorna</button><button class="mini" onclick="openEdit('${source.id}')">Modifica</button><button class="mini" onclick="removeSource('${source.id}')">Elimina</button><button class="mini" onclick="window.open('${escapeHtml(source.site || source.rss)}','_blank')">Apri sito</button></div></div><div class="feed-body">${body}</div></section>`;
}

function renderFeeds() {
  const items = sortSourcesList(state.sources.filter(source => passesFilters(source, state.feeds.get(source.id))));
  if (!items.length) {
    $('feedSections').innerHTML = '<div class="empty">Nessuna fonte o articolo corrisponde ai filtri attivi.</div>';
    return;
  }
  const grouped = new Map();
  items.forEach(source => {
    const cat = source.category || 'Altro';
    if (!grouped.has(cat)) grouped.set(cat, []);
    grouped.get(cat).push(source);
  });
  const categories = sortCategoryNames(grouped.keys());
  $('feedSections').innerHTML = categories.map(cat => {
    const cs = categoryStyle(cat);
    const groupItems = sortSourcesList(grouped.get(cat));
    return `<section class="category-section ${state.collapsed.categories[cat] ? 'is-collapsed' : ''}"><div class="category-head" style="--cat-color:${cs.color}; --cat-bg:${cs.bg};"><div style="display:flex;align-items:center;gap:10px;min-width:0;"><button class="collapser" onclick="toggleCategoryCollapsed('${escapeHtml(cat)}')" title="Apri/chiudi categoria">${state.collapsed.categories[cat] ? '▸' : '▾'}</button><h2>${escapeHtml(cat)}</h2></div><div class="category-meta">${groupItems.length} fonti</div></div><div class="feed-grid">${groupItems.map(buildFeedCard).join('')}</div></section>`;
  }).join('');
}

function applyVisibilityUI() {
  $('searchBarSection').style.display = state.visibility.search ? 'flex' : 'none';
  $('statusBarSection').style.display = state.visibility.status ? 'flex' : 'none';
  $('breakingSection').style.display = state.visibility.breaking ? 'block' : 'none';

  $('modeBarSection').style.display = state.visibility.modeBar ? 'flex' : 'none';
  $('categoryPrefsWrap').style.display = state.visibility.categoryPrefs ? 'block' : 'none';
  document.querySelectorAll('.feed-controls').forEach(el => el.style.display = state.visibility.feedActions ? 'flex' : 'none');
  document.querySelectorAll('.feed-controls').forEach(el => el.style.display = state.visibility.feedActions ? 'flex' : 'none');

function applyAmoled() {
  if (state.visibility.superAmoled) {
    document.body.style.background = '#000';
    document.documentElement.style.setProperty('--bg', '#000');
    document.documentElement.style.setProperty('--panel', '#000');
    document.documentElement.style.setProperty('--panel2', '#000');

  }
  if (state.visibility.amoled) {
    document.body.style.background = '#000';
    document.documentElement.style.setProperty('--bg', '#000');
    document.documentElement.style.setProperty('--panel', '#000');
    document.documentElement.style.setProperty('--panel2', '#050505');
    document.documentElement.style.setProperty('--border', '#17171a');
  } else {
    document.body.style.background = '';
    document.documentElement.style.setProperty('--bg', '#000');
    document.documentElement.style.setProperty('--panel', '#0d0d10');
    document.documentElement.style.setProperty('--panel2', '#17171c');
    document.documentElement.style.setProperty('--border', '#26262d');

function flashSaved() {
  const el = $('lastRefreshLabel');
  const previous = el.textContent;

  setTimeout(() => {
    if (el.textContent === 'Impostazioni salvate') el.textContent = previous;

function syncUI() {
  document.documentElement.style.setProperty('--font-size', `${state.settings.fontScale}px`);
  document.documentElement.style.setProperty('--density', state.settings.density);
  $('articlesPerFeed').value = String(state.settings.articlesPerFeed);

  $('toggleModeBar').checked = state.visibility.modeBar;

  $('toggleAmoled').checked = state.visibility.amoled;

function render() {
  ensureCategoryPrefs();
  refreshCategoryOptions();
  renderCategoryBar();
  renderCategoryPrefs();
  renderStatus();
  buildBreakingAndRanking();
  renderFeeds();
  syncUI();
}

async function fetchViaRss2Json(url) {
  const endpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
  const res = await fetch(endpoint);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (data.status !== 'ok') throw new Error(data.message || 'rss2json error');
  return {
    title: data.feed?.title,
    items: (data.items || []).map(it => ({ title:it.title, description:it.description, pubDate:it.pubDate, link:it.link }))
  };
}

async function fetchViaAllOrigins(url) {
  const endpoint = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const res = await fetch(endpoint);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const xml = await res.text();
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const parserError = doc.querySelector('parsererror');
  if (parserError) throw new Error('XML non valido');
  const items = [...doc.querySelectorAll('item, entry')].map(node => {
    const linkNode = node.querySelector('link');
    const href = linkNode?.getAttribute('href') || linkNode?.textContent || '';
    return {
      title: node.querySelector('title')?.textContent || 'Senza titolo',
      description: node.querySelector('description, summary, content')?.textContent || '',
      pubDate: node.querySelector('pubDate, updated, published')?.textContent || '',
      link: href
    };
  });
  return { items };
}


function isFeedDataValid(data) {
  return !!(data && Array.isArray(data.items) && data.items.length > 0);
}

async function loadFeed(source) {
  state.feeds.set(source.id, { status:'loading', items:[] });
  render();

  const preferred = state.feedProxyMap?.[source.id] || state.settings.proxy || 'rss2json';
  const order = preferred === 'allorigins' ? ['allorigins', 'rss2json'] : ['rss2json', 'allorigins'];

  let lastError = 'impossibile caricare il feed';

  for (const proxy of order) {
    try {
      const data = proxy === 'allorigins'
        ? await fetchViaAllOrigins(source.rss)
        : await fetchViaRss2Json(source.rss);

      if (!isFeedDataValid(data)) {
        lastError = 'feed vuoto o non valido';
        continue;
      }

      state.feeds.set(source.id, {
        status:'ok',
        items:data.items || [],
        title:data.title || source.name,
        proxy_used: proxy
      });

      state.feedProxyMap[source.id] = proxy;
      saveState();
      render();
      return;
    } catch (err) {
      lastError = err?.message || String(err);

      const retryable = /HTTP 429|HTTP 422|rss2json error|XML non valido|feed vuoto|non valido/i.test(lastError);
      if (!retryable && proxy === order[0] && order.length === 1) break;
      continue;
    }
  }

  state.feeds.set(source.id, { status:'error', items:[], error:lastError });
  render();
}

async function preloadFastFeeds() {
  const priority = state.sources.slice(0,6);
  await Promise.allSettled(priority.map(loadFeed));
  const remaining = state.sources.slice(6);
  Promise.allSettled(remaining.map(loadFeed)).then(() => {
    state.loading = false;
    state.lastRefresh = new Date().toISOString();
    render();
  });
}

async function refreshAll() {
  state.loading = true;
  renderStatus();
  await Promise.allSettled(state.sources.map(loadFeed));
  state.loading = false;
  state.lastRefresh = new Date().toISOString();
  render();
}

window.refreshOne = async function(id) {
  const source = state.sources.find(s => s.id === id);
  if (!source) return;
  await loadFeed(source);
  state.lastRefresh = new Date().toISOString();
  render();
};

window.toggleFavorite = function(id) {
  state.favorites = state.favorites.includes(id) ? state.favorites.filter(x => x !== id) : [...state.favorites, id];
  saveState();
  render();
};

function openSourceDialog(source=null) {
  refreshCategoryOptions();
  $('sourceId').value = source?.id || '';
  $('sourceName').value = source?.name || '';
  $('sourceCategory').value = source?.category || '';
  $('sourceUrl').value = source?.rss || '';
  $('sourceSite').value = source?.site || '';
  $('sourceTags').value = (source?.tags || []).join(', ');
  $('sourceDialog').showModal();
}

window.openEdit = function(id) {
  const source = state.sources.find(s => s.id === id);
  if (source) openSourceDialog(source);
};

window.removeSource = function(id) {
  state.sources = state.sources.filter(s => s.id !== id);
  state.favorites = state.favorites.filter(f => f !== id);
  state.feeds.delete(id);
  saveState();
  render();
};

$('saveSourceBtn').addEventListener('click', (ev) => {
  ev.preventDefault();
  const id = $('sourceId').value || crypto.randomUUID();
  const next = {
    id,
    name: $('sourceName').value.trim(),
    category: $('sourceCategory').value.trim() || 'Altro',
    rss: $('sourceUrl').value.trim(),
    site: $('sourceSite').value.trim(),
    tags: $('sourceTags').value.split(',').map(s => slugify(s.trim())).filter(Boolean),
    official: false
  };
  if (!next.name || !next.rss) return;
  const idx = state.sources.findIndex(s => s.id === id);
  if (idx >= 0) state.sources[idx] = next; else state.sources.unshift(next);
  saveState();
  $('sourceDialog').close();
  render();
  loadFeed(next);
});

$('refreshBtn').addEventListener('click', refreshAll);
$('addBtn').addEventListener('click', () => openSourceDialog());
$('settingsFooterBtn').addEventListener('click', () => {
  state.settings.settingsOpen = !state.settings.settingsOpen;
  render();
});
$('searchInput').addEventListener('input', (e) => {
  state.search = e.target.value;
  render();
});
document.querySelectorAll('#modeBarSection .chip').forEach(btn => btn.addEventListener('click', () => {
  state.activeMode = btn.dataset.mode;
  render();
}));

loadState();
render();
state.loading = true;
preloadFastFeeds();
</script>

<script>
window.openCategoryEdit = function(cat){
  var dialog = document.getElementById('categoryDialog');
  var oldInput = document.getElementById('editCategoryOldName');
  var nameInput = document.getElementById('editCategoryName');
  if(!dialog || !oldInput || !nameInput) return;
  oldInput.value = String(cat || '');
  nameInput.value = String(cat || '');
  dialog.showModal();
};

window.saveCategoryEdit = function(){
  var oldName = String(document.getElementById('editCategoryOldName')?.value || '').trim();
  var newName = String(document.getElementById('editCategoryName')?.value || '').trim();
  if(!oldName || !newName) return;
  if(typeof state === 'undefined') return;

  if(oldName !== newName){
    state.sources = state.sources.map(function(source){
      if(source.category === oldName){
        return { ...source, category: newName };
      }
      return source;
    });

    if(state.visibility && state.visibility.categories && Object.prototype.hasOwnProperty.call(state.visibility.categories, oldName)){
      state.visibility.categories[newName] = state.visibility.categories[oldName];
      delete state.visibility.categories[oldName];
    }
    if(state.categoryColors && Object.prototype.hasOwnProperty.call(state.categoryColors, oldName)){
      state.categoryColors[newName] = state.categoryColors[oldName];
      delete state.categoryColors[oldName];
    }
    if(state.categoryPriority && Object.prototype.hasOwnProperty.call(state.categoryPriority, oldName)){
      state.categoryPriority[newName] = state.categoryPriority[oldName];
      delete state.categoryPriority[oldName];
    }
    if(state.collapsed && state.collapsed.categories && Object.prototype.hasOwnProperty.call(state.collapsed.categories, oldName)){
      state.collapsed.categories[newName] = state.collapsed.categories[oldName];
      delete state.collapsed.categories[oldName];
    }
    if(state.activeCategory === oldName){
      state.activeCategory = newName;
    }
  }

  if(typeof ensureCategoryPrefs === 'function') ensureCategoryPrefs();
  if(typeof saveState === 'function') saveState();
  if(typeof render === 'function') render();

  var dialog = document.getElementById('categoryDialog');
  if(dialog) dialog.close();
};

document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('saveCategoryBtn');
  if(btn){
    btn.onclick = window.saveCategoryEdit;
  }
});
</script>
